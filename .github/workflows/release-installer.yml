name: Build Release Installer

on:
    workflow_dispatch:
    push:
        tags:
            - v*

env:
    FORCE_COLOR: true

jobs:
    build-installer:
        runs-on: windows-latest

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build standalone desktop payload
              run: pnpm build --standalone

            - name: Build release installer bundle
              run: node scripts/buildReleaseInstaller.mjs

            - name: Upload installer artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: record-release-installer
                  path: |
                      dist/release/*.zip
                      dist/release/release-manifest.json

            - name: Create GitHub release if missing
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  gh release view "${{ github.ref_name }}" 2>$null
                  if ($LASTEXITCODE -ne 0) {
                    gh release create "${{ github.ref_name }}" --generate-notes
                  }
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload installer bundle to release
              if: startsWith(github.ref, 'refs/tags/')
              run: gh release upload "${{ github.ref_name }}" dist/release/*.zip dist/release/release-manifest.json --clobber
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
